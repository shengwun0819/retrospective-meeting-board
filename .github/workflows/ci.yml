name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: retro-board

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: retro-board/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit && npx tsc --noEmit -p tsconfig.test.json

      - name: Unit tests
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: retro-board/coverage/
          retention-days: 7
